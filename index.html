    <style>

<script>
// ============================================================
// MATERI YANG DIKECUALIKAN DARI CEK BENTROK LINTAS PRODI
// (boleh dijadwalkan bersamaan di banyak prodi)
// ============================================================
const MATERI_BEBAS_BENTROK = [
    'SENAM PAGI',
    'KESAMAPTAAN',
    'OUTBOUND',
    'Administration',
    'Perkenalan Staff',
    'Beauty & Handsome Class',
    'PENGUKUHAN SISWA BARU & OPENING CLASS BATCH XVII'
];

// ============================================================
// DATA DEFAULT
// ============================================================
let dataProdi = [
    { id: 'gs1', name: 'GS 1', defaultRoom: 'Ruang Airbus' },
    { id: 'gs2', name: 'GS 2', defaultRoom: 'Ruang Boing'  },
    { id: 'gs3', name: 'GS 3', defaultRoom: 'Ruang Airbus' },
    { id: 'gs4', name: 'GS 4', defaultRoom: 'Ruang Boing'  },
    { id: 'gs5', name: 'GS 5', defaultRoom: 'Ruang Airbus' },
    { id: 'fa1', name: 'FA 1', defaultRoom: 'Ruang Boing'  },
    { id: 'fa2', name: 'FA 2', defaultRoom: 'ATR'          },
    { id: 'fa3', name: 'FA 3', defaultRoom: 'ATR'          }
];
let dataRoom = ['Ruang Boing', 'Ruang Airbus', 'ATR', 'Outdoor', 'Kantor Gedung 1'];
let dataMateri = [
    { name: 'Grooming & Attitude', quota: 10 }, { name: 'AVK', quota: 10 },
    { name: 'Ramp Handling', quota: 10 }, { name: 'Communication Skill', quota: 10 },
    { name: 'Customer Service', quota: 10 }, { name: 'Reservasi & Ticketing', quota: 10 },
    { name: 'PB Handling', quota: 10 }, { name: 'English Conversation', quota: 10 },
    { name: 'Japan', quota: 10 }, { name: 'Psikotest', quota: 10 },
    { name: 'KESAMAPTAAN', quota: 10 }, { name: 'Administration', quota: 10 },
    { name: 'Perkenalan Staff', quota: 10 }, { name: 'Beauty Class', quota: 10 },
    { name: 'PHOTOSHOOT', quota: 10 }, { name: 'Aviation Knowledge', quota: 10 },
    { name: 'PENGUKUHAN SISWA BARU & OPENING CLASS BATCH XVII', quota: 10 },
    { name: 'SENAM PAGI', quota: 10 }, { name: 'Basic Cabin', quota: 10 },
    { name: 'Announcement', quota: 10 }, { name: 'Flight Safety', quota: 10 },
    { name: 'Safety Demo', quota: 10 }, { name: 'Beauty & Handsome Class', quota: 10 },
    { name: 'Pax & Bag Handling', quota: 10 }, { name: 'Basic Cargo', quota: 10 },
    { name: 'OUTBOUND', quota: 10 }
];
const strukturWaktu = [
    { sesi: 'I',   jam: '05.00-06.00' }, { sesi: 'II',  jam: '08.00-09.30' },
    { sesi: 'III', jam: '09.30-11.00' }, { sesi: 'IV',  jam: '11.30-13.00' },
    { sesi: 'V',   jam: '13.00-14.30' }, { sesi: 'VI',  jam: '15.00-16.30' },
    { sesi: 'VII', jam: '16.30-18.00' }
];
const daftarHari = ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat'];
const listMingguRomawi = ['I','II','III','IV','V','VI','VII','VIII','IX','X',
    'XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX','XXI','XXII'];
const bulanConfig = {
    'Juli 2026':      { weeks: ['I','II','III','IV','V'],       mondayDates: ['2026-06-29','2026-07-06','2026-07-13','2026-07-20','2026-07-27'] },
    'Agustus 2026':   { weeks: ['VI','VII','VIII','IX'],        mondayDates: ['2026-08-03','2026-08-10','2026-08-17','2026-08-24'] },
    'September 2026': { weeks: ['X','XI','XII','XIII','XIV'],   mondayDates: ['2026-08-31','2026-09-07','2026-09-14','2026-09-21','2026-09-28'] },
    'Oktober 2026':   { weeks: ['XV','XVI','XVII','XVIII'],     mondayDates: ['2026-10-05','2026-10-12','2026-10-19','2026-10-26'] },
    'November 2026':  { weeks: ['XIX','XX','XXI','XXII'],       mondayDates: ['2026-11-02','2026-11-09','2026-11-16','2026-11-23'] }
};
const daftarBulan = Object.keys(bulanConfig);

// ============================================================
// STATE GLOBAL
// ============================================================
let scheduleData    = {};   // jadwal prodi AKTIF saja
let allProdiSchedules = {}; // cache semua jadwal prodi untuk cek bentrok: { prodiId: scheduleData }
let currentProdi    = null;
let currentEditCell = null;
let unsubProdi      = null;
let unsubAllProdi   = {};   // listener per prodi untuk cache bentrok

// ============================================================
// HELPER
// ============================================================
function getActiveRoom(baseRoom, bulan) {
    const idx = daftarBulan.indexOf(bulan);
    if (idx % 2 !== 0) {
        if (baseRoom === 'Ruang Airbus') return 'Ruang Boing';
        if (baseRoom === 'Ruang Boing')  return 'Ruang Airbus';
    }
    return baseRoom;
}
function getDefaultWeeksForMonth(bulan) {
    return bulanConfig[bulan] ? bulanConfig[bulan].weeks : ['I','II','III','IV'];
}
function getMondayForWeek(bulan, minggu) {
    const config = bulanConfig[bulan];
    if (!config) return new Date('2026-07-06');
    const wi = config.weeks.indexOf(minggu);
    if (wi !== -1) return new Date(config.mondayDates[wi]);
    const lastIdx    = config.weeks.length - 1;
    const lastMonday = new Date(config.mondayDates[lastIdx]);
    const extra = listMingguRomawi.indexOf(minggu) - listMingguRomawi.indexOf(config.weeks[lastIdx]);
    lastMonday.setDate(lastMonday.getDate() + extra * 7);
    return lastMonday;
}

// ============================================================
// CEK BENTROK LINTAS PRODI
// Mengembalikan array nama prodi yang punya materi sama di
// bulan+minggu+sesi+hari yang sama (tanpa prodi aktif sendiri).
// Materi dalam MATERI_BEBAS_BENTROK selalu return [].
// ============================================================
function cekBentrokLintas(materiName, bulan, minggu, sesi, hari) {
    if (!materiName) return [];
    if (MATERI_BEBAS_BENTROK.includes(materiName)) return [];
    const bentrok = [];
    for (const pId in allProdiSchedules) {
        if (pId === currentProdi?.id) continue;
        const sel = allProdiSchedules[pId]?.[bulan]?.[minggu]?.[sesi]?.[hari];
        if (sel && sel.materi === materiName) {
            const prodiObj = dataProdi.find(p => p.id === pId);
            bentrok.push(prodiObj ? prodiObj.name : pId);
        }
    }
    return bentrok;
}

// Untuk satu prodi: ambil semua (bulan,minggu,sesi,hari) yang punya bentrok
function getProdiConflictKeys(prodiId) {
    const sd = allProdiSchedules[prodiId] || {};
    const conflicts = new Set(); // key: "bulan|minggu|sesi|hari"
    for (const bulan in sd) {
        for (const minggu in sd[bulan]) {
            for (const sesi in sd[bulan][minggu]) {
                for (const hari in sd[bulan][minggu][sesi]) {
                    const materi = sd[bulan][minggu][sesi][hari]?.materi;
                    if (!materi || MATERI_BEBAS_BENTROK.includes(materi)) continue;
                    // Cek apakah ada prodi lain dengan materi+waktu sama
                    for (const otherId in allProdiSchedules) {
                        if (otherId === prodiId) continue;
                        const otherSel = allProdiSchedules[otherId]?.[bulan]?.[minggu]?.[sesi]?.[hari];
                        if (otherSel && otherSel.materi === materi) {
                            conflicts.add(`${bulan}|${sesi}|${hari}`);
                        }
                    }
                }
            }
        }
    }
    return conflicts;
}

// Apakah prodi punya SETIDAKNYA 1 bentrok di bulan tertentu?
function prodiHasConflictInBulan(prodiId, bulan) {
    const sd = allProdiSchedules[prodiId] || {};
    const bulanData = sd[bulan] || {};
    for (const minggu in bulanData) {
        for (const sesi in bulanData[minggu]) {
            for (const hari in bulanData[minggu][sesi]) {
                const materi = bulanData[minggu][sesi][hari]?.materi;
                if (!materi || MATERI_BEBAS_BENTROK.includes(materi)) continue;
                for (const otherId in allProdiSchedules) {
                    if (otherId === prodiId) continue;
                    const os = allProdiSchedules[otherId]?.[bulan]?.[minggu]?.[sesi]?.[hari];
                    if (os && os.materi === materi) return true;
                }
            }
        }
    }
    return false;
}

// ============================================================
// FIREBASE HELPERS
// ============================================================
function waitFirebase() {
    return new Promise(resolve => {
        const t = setInterval(() => {
            if (window.firebaseDb && window.firebaseAuth) {
                clearInterval(t);
                resolve({ db: window.firebaseDb, auth: window.firebaseAuth });
            }
        }, 80);
    });
}
function toggleLoading(show, msg = 'Sinkronisasi...') {
    if (show && !document.getElementById('loadingOverlay')) {
        document.body.insertAdjacentHTML('beforeend', `
            <div id="loadingOverlay" class="fixed inset-0 bg-black bg-opacity-70 z-[100] flex flex-col justify-center items-center text-white">
                <i class="fas fa-spinner fa-spin text-5xl mb-4"></i>
                <h2 class="text-xl font-bold">${msg}</h2>
            </div>`);
    } else if (!show) {
        document.getElementById('loadingOverlay')?.remove();
    }
}
function setSyncStatus(ok) {
    const el = document.getElementById('syncStatus');
    if (!el) return;
    el.innerHTML = ok
        ? '<i class="fas fa-cloud text-green-600"></i> <span class="text-green-600">Firebase Sync Aktif</span>'
        : '<i class="fas fa-exclamation-triangle text-red-500"></i> <span class="text-red-500">Offline / Error</span>';
}
function showToast(msg, color = 'bg-gray-800') {
    const t = document.createElement('div');
    t.className = `fixed bottom-6 right-6 ${color} text-white px-5 py-3 rounded-xl shadow-xl z-[200] text-sm font-bold flex items-center gap-2`;
    t.innerHTML = `<i class="fas fa-sync-alt"></i> ${msg}`;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3500);
}

// INIT
// ============================================================
async function initApp() {
    const { db, auth } = await waitFirebase();
    try { await window.fbSignInAnonymously(auth); } catch(e) {}

    await fetchMaster(db);

    // Listener realtime master
    window.fbOnSnapshot(window.fbDoc(db, 'jadwal_angkasa', 'master'), snap => {
        if (!snap.exists()) return;
        const d = snap.data();
        if (d.prodi)  dataProdi  = d.prodi;
        if (d.room)   dataRoom   = d.room;
        if (d.materi) {
            dataMateri = typeof d.materi[0] === 'string'
                ? d.materi.map(m => ({ name: m, quota: 10 })) : d.materi;
        }
        renderDashboard(); updateDropdowns();
    });

    // Tarik & subscribe semua jadwal prodi untuk keperluan cek bentrok
    await fetchAllProdiSchedules(db);
    subscribeAllProdi(db);

    setSyncStatus(true);
    renderDashboard();
    updateDropdowns();
}

// ============================================================
// MASTER
// ============================================================
async function fetchMaster(db) {
    toggleLoading(true, 'Memuat Data Master...');
    try {
        const snap = await window.fbGetDoc(window.fbDoc(db, 'jadwal_angkasa', 'master'));
        if (snap.exists()) {
            const d = snap.data();
            if (d.prodi) dataProdi = d.prodi;
            if (d.room)  dataRoom  = d.room;
            if (d.materi) {
                dataMateri = typeof d.materi[0] === 'string'
                    ? d.materi.map(m => ({ name: m, quota: 10 })) : d.materi;
            }
        } else {
            await saveMaster(db);
        }
    } catch(e) { console.error('fetchMaster', e); setSyncStatus(false); }
    finally { toggleLoading(false); }
}
async function saveMaster(dbArg) {
    const { db } = dbArg ? { db: dbArg } : await waitFirebase();
    try {
        await window.fbSetDoc(window.fbDoc(db, 'jadwal_angkasa', 'master'),
            { prodi: dataProdi, room: dataRoom, materi: dataMateri, updatedAt: new Date().toISOString() });
    } catch(e) { alert('Gagal simpan master:\n' + e.message); }
}

// ============================================================
// JADWAL PER PRODI
// ============================================================
async function fetchProdiSchedule(prodiId) {
    const { db } = await waitFirebase();
    toggleLoading(true, 'Memuat Jadwal...');
    try {
        const snap = await window.fbGetDoc(window.fbDoc(db, 'jadwal_prodi', prodiId));
        scheduleData = snap.exists() ? (snap.data().schedule || {}) : {};
        // Update cache bentrok
        allProdiSchedules[prodiId] = scheduleData;
    } catch(e) { scheduleData = {}; }
    finally { toggleLoading(false); }
}
async function saveProdiSchedule() {
    if (!currentProdi) return;
    const { db } = await waitFirebase();
    try {
        await window.fbSetDoc(window.fbDoc(db, 'jadwal_prodi', currentProdi.id),
            { schedule: scheduleData, updatedAt: new Date().toISOString() });
        allProdiSchedules[currentProdi.id] = scheduleData;
        renderDashboard(); // refresh dot merah setelah simpan
    } catch(e) { alert('Gagal menyimpan:\n' + e.message); }
}

// ============================================================
// CACHE SEMUA JADWAL PRODI (untuk deteksi bentrok di dashboard)
// ============================================================
async function fetchAllProdiSchedules(db) {
    for (const prodi of dataProdi) {
        try {
            const snap = await window.fbGetDoc(window.fbDoc(db, 'jadwal_prodi', prodi.id));
            allProdiSchedules[prodi.id] = snap.exists() ? (snap.data().schedule || {}) : {};
        } catch(e) { allProdiSchedules[prodi.id] = {}; }
    }
}

// Subscribe semua prodi → update cache bentrok & re-render dashboard dot
function subscribeAllProdi(db) {
    dataProdi.forEach(prodi => {
        if (unsubAllProdi[prodi.id]) { unsubAllProdi[prodi.id](); }
        unsubAllProdi[prodi.id] = window.fbOnSnapshot(
            window.fbDoc(db, 'jadwal_prodi', prodi.id),
            snap => {
                const incoming = snap.exists() ? (snap.data().schedule || {}) : {};
                allProdiSchedules[prodi.id] = incoming;
                // Jika ini prodi yang sedang dibuka → update scheduleData & re-render tabel
                if (currentProdi && currentProdi.id === prodi.id) {
                    if (JSON.stringify(incoming) !== JSON.stringify(scheduleData)) {
                        scheduleData = incoming;
                        renderScheduleTable();
                        showToast('Jadwal diperbarui oleh pengguna lain 🔄');
                    }
                }
                renderDashboard(); // refresh dot merah di dashboard
            }
        );
    });
}

function subscribeProdi(prodiId) {

}

// KUOTA
// ============================================================
function countMateriUsage(materiName) {
    let count = 0;
    for (const bulan in scheduleData)
        for (const minggu in scheduleData[bulan])
            for (const sesi in scheduleData[bulan][minggu])
                for (const hari in scheduleData[bulan][minggu][sesi])
                    if (scheduleData[bulan][minggu][sesi][hari]?.materi === materiName) count++;
    return count;
}

// ============================================================
// UPDATE INFO MATERI + CEK BENTROK SAAT PILIH DI MODAL EDIT
// ============================================================
function updateMateriInfo() {
    const infoEl   = document.getElementById('materiQuotaInfo');
    const warnEl   = document.getElementById('conflictWarning');
    const btnSave  = document.getElementById('btnSimpan');
    const name     = document.getElementById('editMateri').value;

    // Reset warning
    warnEl.classList.add('hidden');
    warnEl.innerHTML = '';
    btnSave.className = 'px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700';

    if (!name) { infoEl.classList.add('hidden'); return; }
    const obj = dataMateri.find(m => m.name === name);
    if (!obj)  { infoEl.classList.add('hidden'); return; }

    // Info kuota
    let curCellMateri = '';
    if (currentEditCell) {
        const { bulan, minggu, sesi, hari } = currentEditCell;
        curCellMateri = scheduleData[bulan]?.[minggu]?.[sesi]?.[hari]?.materi || '';
    }
    const isThisCell = curCellMateri === name;
    const usage      = countMateriUsage(name);
    if (obj.quota > 0) {
        let sisa = obj.quota - usage - (isThisCell ? 0 : 1);
        let text = `Terpakai: ${usage}x. (Sisa: ${sisa}x)`;
        if      (sisa < 0)  { infoEl.className = 'text-xs font-bold mt-1 text-red-600';    text += ' ⚠️ OVERLIMIT!'; }
        else if (sisa === 0) { infoEl.className = 'text-xs font-bold mt-1 text-orange-600'; text += ' ⚠️ Kuota Habis'; }
        else                  { infoEl.className = 'text-xs font-semibold mt-1 text-blue-600'; }
        infoEl.innerText = text;
    } else {
        infoEl.className = 'text-xs font-semibold mt-1 text-gray-500';
        infoEl.innerText = `Terpakai: ${usage}x. (Kuota: tidak terbatas)`;
    }
    infoEl.classList.remove('hidden');

    // Cek bentrok lintas prodi
    if (currentEditCell && !MATERI_BEBAS_BENTROK.includes(name)) {
        const { bulan, minggu, sesi, hari } = currentEditCell;
        const bentrokList = cekBentrokLintas(name, bulan, minggu, sesi, hari);
        if (bentrokList.length > 0) {
            warnEl.innerHTML = `⚠️ <b>Peringatan!</b> Materi <b>"${name}"</b> sudah dijadwalkan di <b>${bentrokList.join(', ')}</b> pada waktu yang sama.<br>
                <span class="text-orange-700">Anda masih bisa menyimpan, tapi akan tercatat sebagai bentrok.</span>`;
            warnEl.classList.remove('hidden');
            // Ubah tombol simpan jadi oranye sebagai penanda
            btnSave.className = 'px-4 py-2 bg-orange-500 text-white rounded hover:bg-orange-600';
        }
    }
}

// ============================================================
// RENDER TABEL — sel bentrok diberi class cell-conflict
// ============================================================
function buildTableContent(prodi, bulan, wrapperElement) {
    const activeDefaultRoom = getActiveRoom(prodi.defaultRoom, bulan);
    if (!scheduleData[bulan]) scheduleData[bulan] = {};

    let existingWeeks = Object.keys(scheduleData[bulan]);
    existingWeeks.sort((a, b) => listMingguRomawi.indexOf(a) - listMingguRomawi.indexOf(b));
    if (existingWeeks.length === 0) {
        getDefaultWeeksForMonth(bulan).forEach(w => { scheduleData[bulan][w] = {}; });
        existingWeeks = [...getDefaultWeeksForMonth(bulan)];
    }

    // Hitung set key bentrok untuk prodi aktif di bulan ini
    const conflictKeys = getProdiConflictKeys(prodi.id);

    existingWeeks.forEach(minggu => {
        if (!scheduleData[bulan][minggu]) scheduleData[bulan][minggu] = {};
        const weekDiv = document.createElement('div');
        weekDiv.className = 'week-container';
        const table   = document.createElement('table');
        table.className = 'jadwal-table w-full text-sm';
        const tbody   = document.createElement('tbody');
        table.appendChild(tbody);

        let skipDay = {};
        daftarHari.forEach(h => { skipDay[h] = 0; });

        const weekMonday = getMondayForWeek(bulan, minggu);
        const headerTr   = document.createElement('tr');
        headerTr.innerHTML = '<th>Minggu Ke-</th><th>Jam Ke-</th><th>Pukul</th>';
        const formattedDates = [];
        daftarHari.forEach((hari, hIdx) => {
            const d   = new Date(weekMonday);
            d.setDate(d.getDate() + hIdx);
            const dd  = String(d.getDate()).padStart(2,'0');
            const mm  = String(d.getMonth()+1).padStart(2,'0');
            const ds  = `${dd}/${mm}/${d.getFullYear()}`;
            formattedDates.push(ds);
            headerTr.innerHTML += `<th>${hari}<br><span class="text-xs font-normal">(${ds})</span></th>`;
        });
        tbody.appendChild(headerTr);

        strukturWaktu.forEach((waktu, sIdx) => {
            if (!scheduleData[bulan][minggu][waktu.sesi]) scheduleData[bulan][minggu][waktu.sesi] = {};
            const tr = document.createElement('tr');
            if (sIdx === 0) {
                const tdM = document.createElement('td');
                tdM.rowSpan = strukturWaktu.length;
                tdM.className = 'bg-white font-bold border';
                tdM.innerText = minggu;
                tr.appendChild(tdM);
            }
            tr.innerHTML += `<td class="font-bold border">${waktu.sesi}</td><td class="font-bold border">${waktu.jam}</td>`;

            daftarHari.forEach((hari, hIdx) => {
                if (skipDay[hari] > 0) { skipDay[hari]--; return; }
                const td       = document.createElement('td');
                const cellData = scheduleData[bulan][minggu][waktu.sesi][hari] || { materi:'', instruktur:'', ruang:'' };
                const isAuto   = cellData.materi === 'PENGUKUHAN SISWA BARU & OPENING CLASS BATCH XVII';
                const isFull   = cellData.isFullDay || isAuto;

                // Cek apakah sel ini bentrok
                const conflictKey = `${bulan}|${waktu.sesi}|${hari}`;
                const isConflict  = cellData.materi && !MATERI_BEBAS_BENTROK.includes(cellData.materi)
                    && conflictKeys.has(conflictKey);

                let tdClass = 'hari-cell border';
                if (cellData.isLibur) tdClass += ' bg-red-400 text-white';
                if (isConflict)       tdClass += ' cell-conflict';
                td.className = tdClass;
                td.style.position = 'relative';

                if (isFull) {
                    const span = strukturWaktu.length - sIdx;
                    td.rowSpan = span;
                    skipDay[hari] = span - 1;
                }

                let html = `<div class="cell-content ${isFull ? 'justify-center items-center' : ''}">`;
                if (cellData.materi) {
                    const vc = (isFull && isAuto) ? 'writing-vertical' : '';
                    html += `<div class="cell-materi ${vc}">${cellData.materi}</div>`;
                    // Jika bentrok, tampilkan nama prodi lain yang bentrok
                    if (isConflict) {
                        const b2 = cekBentrokLintas(cellData.materi, bulan, minggu, waktu.sesi, hari);
                        if (b2.length > 0) {
                            html += `<div style="font-size:0.65rem;color:#ea580c;padding:1px 2px;">⚠ Bentrok: ${b2.join(', ')}</div>`;
                        }
                    }
                    if (cellData.instruktur) html += `<div class="cell-instruktur">${cellData.instruktur}</div>`;
                    let ruang = cellData.ruang;
                    if (!ruang || ruang === '') ruang = activeDefaultRoom;
                    else if (ruang === '-') ruang = '';
                    if (ruang) {
                        const rc = cellData.isLibur ? 'bg-red-600' : 'bg-blue-500';
                        html += `<div class="cell-ruang ${rc}">${ruang}</div>`;
                    }
                }
                html += '</div>';
                td.innerHTML = html;
                td.onclick = () => openEditModal(bulan, minggu, waktu.sesi, hari, cellData, formattedDates[hIdx]);
                tr.appendChild(td);
            });
            tbody.appendChild(tr);
        });
        weekDiv.appendChild(table);
        wrapperElement.appendChild(weekDiv);
    });
}

function renderScheduleTable() {
    const wrapper = document.getElementById('tableWrapper');
    wrapper.innerHTML = '';
    if (!currentProdi) return;
    const bulan = document.getElementById('monthSelector').value;
    const room  = getActiveRoom(currentProdi.defaultRoom, bulan);

    // Tandai selector bulan jika ada bentrok
    const selector = document.getElementById('monthSelector');
    Array.from(selector.options).forEach(opt => {
        const b = opt.value;
        const hasC = prodiHasConflictInBulan(currentProdi.id, b);
        opt.text = hasC ? `${b} ⚠` : b;
        opt.style.color = hasC ? '#ef4444' : '';
    });

    document.getElementById('scheduleTitle').innerText =
        `JADWAL MATERI - ${currentProdi.name} (${room}) - ${bulan}`;
    buildTableContent(currentProdi, bulan, wrapper);
}

// ============================================================
// TAMBAH / KURANGI MINGGU
// ============================================================
function addWeek() {
    const bulan = document.getElementById('monthSelector').value;
    if (!scheduleData[bulan]) scheduleData[bulan] = {};
    const weeks = Object.keys(scheduleData[bulan]);
    if (weeks.length >= listMingguRomawi.length) { alert('Maksimal minggu tercapai.'); return; }
    let maxIdx = -1;
    weeks.forEach(w => { const i = listMingguRomawi.indexOf(w); if (i > maxIdx) maxIdx = i; });
    const next = listMingguRomawi[maxIdx + 1];
    if (!next) { alert('Tidak ada label minggu berikutnya.'); return; }
    scheduleData[bulan][next] = {};
    saveData(); renderScheduleTable();
}
function removeWeek() {
    const bulan = document.getElementById('monthSelector').value;
    const weeks = Object.keys(scheduleData[bulan] || {});
    if (weeks.length <= 1) { alert('Minimal 1 minggu harus ada.'); return; }
    weeks.sort((a, b) => listMingguRomawi.indexOf(a) - listMingguRomawi.indexOf(b));
    const last = weeks[weeks.length - 1];
    if (confirm(`Hapus Minggu Ke-${last}? Data di dalamnya hilang.`)) {
        delete scheduleData[bulan][last];
        saveData(); renderScheduleTable();
    }
}

function saveCellData() {
    if (!currentEditCell) return;
    const { bulan, minggu, sesi, hari } = currentEditCell;
    const materi     = document.getElementById('editMateri').value;
    const instruktur = document.getElementById('editInstruktur').value;
    const ruang      = document.getElementById('editRuang').value;
    const isFullDay  = document.getElementById('editFullDay').checked;
    const isLibur    = document.getElementById('editLibur').checked;

    // Cek bentrok — HANYA PERINGATAN, tidak memblokir simpan

        const bentrok = cekBentrokLintas(materi, bulan, minggu, sesi, hari);
        if (bentrok.length > 0) {
            // Konfirmasi sebelum menyimpan jadwal yang bentrok
            const lanjut = confirm(
                `⚠️ PERINGATAN BENTROK!\n\nMateri "${materi}" sudah ada di prodi: ${bentrok.join(', ')}\npada waktu yang sama.\n\nTetap simpan? (Akan tercatat sebagai bentrok & diberi tanda di tabel)`
            );
            if (!lanjut) return; // Batal simpan jika user memilih Cancel
        }
    }

    if (!scheduleData[bulan]) scheduleData[bulan] = {};
    if (!scheduleData[bulan][minggu]) scheduleData[bulan][minggu] = {};
    if (!scheduleData[bulan][minggu][sesi]) scheduleData[bulan][minggu][sesi] = {};
    scheduleData[bulan][minggu][sesi][hari] = { materi, instruktur, ruang, isFullDay, isLibur };
    saveData();
    closeEditModal();
    renderScheduleTable();
}

// ============================================================
// CETAK PDF
// ============================================================
function openPrintModal() {
    const cur = document.getElementById('monthSelector').value;
    document.getElementById('printMonthList').innerHTML = daftarBulan.map(b =>
        `<label class="flex items-center space-x-3 cursor-pointer p-3 hover:bg-gray-50 rounded border border-gray-200">
            <input type="checkbox" value="${b}" class="print-month-cb h-5 w-5" ${b===cur?'checked':''}>
            <span class="text-sm font-bold">Bulan ${b}</span>
        </label>`).join('');
    document.getElementById('printModal').classList.remove('hidden');
}
function closePrintModal() { document.getElementById('printModal').classList.add('hidden'); }
let allSelected = false;
function toggleAllPrintMonths() {
    allSelected = !allSelected;
    document.querySelectorAll('.print-month-cb').forEach(c => c.checked = allSelected);
}
function executePrint() {
    const months = Array.from(document.querySelectorAll('.print-month-cb:checked')).map(c => c.value);
    if (!months.length) { alert('Pilih minimal 1 bulan!'); return; }
    closePrintModal();
    const wrapper = document.getElementById('tableWrapper');
    wrapper.innerHTML = '';
    months.forEach(bulan => {
        const room = getActiveRoom(currentProdi.defaultRoom, bulan);
        const sec  = document.createElement('div');
        sec.className = 'print-section';
        sec.innerHTML = `<h2 class="print-only-title">JADWAL MATERI - ${currentProdi.name} (${room}) - ${bulan}</h2>`;
        buildTableContent(currentProdi, bulan, sec);
        wrapper.appendChild(sec);
    });
    document.getElementById('scheduleTitle').classList.add('no-print');
    setTimeout(() => {
        window.print();
        setTimeout(() => {
            document.getElementById('scheduleTitle').classList.remove('no-print');
            renderScheduleTable();
        }, 500);
    }, 300);
}

window.onload = initApp;
</script>
