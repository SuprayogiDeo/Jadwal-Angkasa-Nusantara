    <script>
        // ==========================================
        // DATA DEFAULT & VARIABEL GLOBAL
        // ==========================================
        let dataProdi = [
            { id: 'gs1', name: 'GS 1', defaultRoom: 'Ruang Airbus' }, 
            { id: 'gs2', name: 'GS 2', defaultRoom: 'Ruang Boing' },
            { id: 'gs3', name: 'GS 3', defaultRoom: 'Ruang Airbus' },
            { id: 'gs4', name: 'GS 4', defaultRoom: 'Ruang Boing' },
            { id: 'gs5', name: 'GS 5', defaultRoom: 'Ruang Airbus' },
            { id: 'fa1', name: 'FA 1', defaultRoom: 'Ruang Boing' },
            { id: 'fa2', name: 'FA 2', defaultRoom: 'ATR' },
            { id: 'fa3', name: 'FA 3', defaultRoom: 'ATR' }
        ];
        let dataRoom = ['Ruang Boing', 'Ruang Airbus', 'ATR', 'Outdoor', 'Kantor Gedung 1'];
        let dataMateri = [
            { name: 'Grooming & Attitude', quota: 10 }, { name: 'AVK', quota: 10 },
            { name: 'Ramp Handling', quota: 10 }, { name: 'Communication Skill', quota: 10 }, 
            { name: 'Customer Service', quota: 10 }, { name: 'Reservasi & Ticketing', quota: 10 },
            { name: 'PB Handling', quota: 10 }, { name: 'English Conversation', quota: 10 },
            { name: 'Japan', quota: 10 }, { name: 'Psikotest', quota: 10 },
            { name: 'KESAMAPTAAN', quota: 10 }, { name: 'Administration', quota: 10 },
            { name: 'Perkenalan Staff', quota: 10 }, { name: 'Beauty Class', quota: 10 },
            { name: 'PHOTOSHOOT', quota: 10 }, { name: 'Aviation Knowledge', quota: 10 },
            { name: 'PENGUKUHAN SISWA BARU & OPENING CLASS BATCH XVII', quota: 10 },
            { name: 'SENAM PAGI', quota: 10 }, { name: 'Basic Cabin', quota: 10 },
            { name: 'Announcement', quota: 10 }, { name: 'Flight Safety', quota: 10 },
            { name: 'Safety Demo', quota: 10 }, { name: 'Beauty & Handsome Class', quota: 10 },
            { name: 'Pax & Bag Handling', quota: 10 }, { name: 'Basic Cargo', quota: 10 },
            { name: 'OUTBOUND', quota: 10 }
        ];
        const strukturWaktu = [
            { sesi: 'I', jam: '05.00-06.00' }, { sesi: 'II', jam: '08.00-09.30' },
            { sesi: 'III', jam: '09.30-11.00' }, { sesi: 'IV', jam: '11.30-13.00' },
            { sesi: 'V', jam: '13.00-14.30' }, { sesi: 'VI', jam: '15.00-16.30' },
            { sesi: 'VII', jam: '16.30-18.00' }
        ];
        const daftarHari = ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat'];

        // ==========================================
        // FIX 1: STRUKTUR MINGGU PER BULAN
        // Setiap bulan punya daftar minggu & tanggal Senin-nya masing-masing.
        // Tanggal Senin (baseDate) dihitung manual & benar agar tidak bergantung
        // pada indeks romawi global yang menyebabkan tanggal loncatan.
        // ==========================================
        const bulanConfig = {
            'Juli 2026': {
                weeks: ['I', 'II', 'III', 'IV', 'V'],
                // Senin pertama minggu pertama Juli 2026 = 29 Juni 2026
                mondayDates: ['2026-06-29', '2026-07-06', '2026-07-13', '2026-07-20', '2026-07-27']
            },
            'Agustus 2026': {
                weeks: ['VI', 'VII', 'VIII', 'IX'],
                // Senin pertama Agustus 2026 = 3 Agustus 2026
                mondayDates: ['2026-08-03', '2026-08-10', '2026-08-17', '2026-08-24']
            },
            'September 2026': {
                weeks: ['X', 'XI', 'XII', 'XIII', 'XIV'],
                // Senin pertama September 2026 = 31 Agustus 2026
                mondayDates: ['2026-08-31', '2026-09-07', '2026-09-14', '2026-09-21', '2026-09-28']
            },
            'Oktober 2026': {
                weeks: ['XV', 'XVI', 'XVII', 'XVIII'],
                // Senin pertama Oktober 2026 = 5 Oktober 2026
                mondayDates: ['2026-10-05', '2026-10-12', '2026-10-19', '2026-10-26']
            },
            'November 2026': {
                weeks: ['XIX', 'XX', 'XXI', 'XXII'],
                // Senin pertama November 2026 = 2 November 2026
                mondayDates: ['2026-11-02', '2026-11-09', '2026-11-16', '2026-11-23']
            }
        };

        // Semua angka romawi yang mungkin dipakai (untuk sorting lintas bulan)
        const listMingguRomawi = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX', 'X',
            'XI', 'XII', 'XIII', 'XIV', 'XV', 'XVI', 'XVII', 'XVIII', 'XIX', 'XX', 'XXI', 'XXII'];

        const daftarBulan = Object.keys(bulanConfig);

        let scheduleData = {};
        let currentProdi = null;
        let currentEditCell = null;

        // ==========================================
        // HELPER FUNGSI
        // ==========================================
        function getActiveRoom(baseRoom, bulan) {
            const monthIndex = daftarBulan.indexOf(bulan);
            if (monthIndex % 2 !== 0) {
                if (baseRoom === 'Ruang Airbus') return 'Ruang Boing';
                if (baseRoom === 'Ruang Boing') return 'Ruang Airbus';
            }
            return baseRoom;
        }

        function getDefaultWeeksForMonth(bulan) {
            return bulanConfig[bulan] ? bulanConfig[bulan].weeks : ['I', 'II', 'III', 'IV'];
        }

        /**
         * FIX 2: Mendapatkan tanggal Senin yang BENAR untuk minggu tertentu di bulan tertentu.
         * Sebelumnya: weekBaseDate.setDate(baseDate + romawi_index * 7)  → SALAH
         * Sekarang  : pakai lookup tabel mondayDates per bulan             → BENAR
         */
        function getMondayForWeek(bulan, minggu) {
            const config = bulanConfig[bulan];
            if (!config) return new Date('2026-07-06');
            const weekIndex = config.weeks.indexOf(minggu);
            if (weekIndex === -1) {
                // Minggu tambahan (addWeek) di luar default → hitung mundur dari terakhir
                const lastIdx = config.weeks.length - 1;
                const lastMonday = new Date(config.mondayDates[lastIdx]);
                const extraWeeks = listMingguRomawi.indexOf(minggu) - listMingguRomawi.indexOf(config.weeks[lastIdx]);
                lastMonday.setDate(lastMonday.getDate() + extraWeeks * 7);
                return lastMonday;
            }
            return new Date(config.mondayDates[weekIndex]);
        }

        // ==========================================
        // FIREBASE
        // ==========================================
        function getFirebaseDB() {
            return new Promise((resolve) => {
                const checkInterval = setInterval(() => {
                    if (window.firebaseDb && window.firebaseAuth) {
                        clearInterval(checkInterval);
                        resolve({
                            db: window.firebaseDb,
                            auth: window.firebaseAuth,
                            doc: window.doc,
                            setDoc: window.setDoc,
                            getDoc: window.getDoc,
                            signInAnonymously: window.signInAnonymously,
                            appId: window.globalAppId
                        });
                    }
                }, 100);
            });
        }
        function toggleLoading(show) {
            const loadingHtml = `
                <div id="loadingOverlay" class="fixed inset-0 bg-black bg-opacity-70 z-[100] flex flex-col justify-center items-center text-white">
                    <i class="fas fa-spinner fa-spin text-5xl mb-4"></i>
                    <h2 class="text-xl font-bold">Sinkronisasi Database...</h2>
                    <p class="text-sm">Tunggu sebentar ya.</p>
                </div>`;
            if (show && !document.getElementById('loadingOverlay')) {
                document.body.insertAdjacentHTML('beforeend', loadingHtml);
            } else if (!show) {
                const overlay = document.getElementById('loadingOverlay');
                if (overlay) overlay.remove();
            }
        }
        async function fetchFromCloud() {
            toggleLoading(true);
            try {
                const firebase = await getFirebaseDB();
                await firebase.signInAnonymously(firebase.auth);
                if (!firebase.auth.currentUser) return;
                const docRef = firebase.doc(firebase.db, 'jadwal_angkasa', 'data_utama');
                const docSnap = await firebase.getDoc(docRef);
                if (docSnap.exists()) {
                    const cloudData = docSnap.data();
                    if (cloudData.prodi) dataProdi = cloudData.prodi;
                    if (cloudData.room) dataRoom = cloudData.room;
                    if (cloudData.schedule) scheduleData = cloudData.schedule;
                    if (cloudData.materi && cloudData.materi.length > 0) {
                        if (typeof cloudData.materi[0] === 'string') {
                            dataMateri = cloudData.materi.map(m => ({ name: m, quota: 10 }));
                        } else {
                            dataMateri = cloudData.materi;
                        }
                    }
                    console.log("Data ditarik dari Firebase!");
                } else {
                    console.log("Database kosong. Menyiapkan lembar kerja baru...");
                    scheduleData = {};
                    await saveToCloud(firebase);
                }
            } catch (error) {
                console.error("Gagal terhubung ke Firebase:", error);
                alert("PESAN ERROR FIREBASE (Tarik Data):\n\n" + error.message + "\n\nPastikan Rules Firestore sudah benar.");
            } finally {
                toggleLoading(false);
                renderDashboard();
                updateDropdowns();
            }
        }
        async function saveToCloud(firebaseInstance = null) {
            const packageData = {
                prodi: dataProdi,
                room: dataRoom,
                materi: dataMateri,
                schedule: scheduleData,
                updatedAt: new Date().toISOString()
            };
            toggleLoading(true);
            try {
                const firebase = firebaseInstance || await getFirebaseDB();
                if (!firebase.auth.currentUser) {
                    await firebase.signInAnonymously(firebase.auth);
                }
                if (!firebase.auth.currentUser) return;
                const docRef = firebase.doc(firebase.db, 'jadwal_angkasa', 'data_utama');
                await firebase.setDoc(docRef, packageData);
                console.log("Data berhasil disimpan ke Firebase!");
            } catch (error) {
                console.error("Gagal menyimpan ke Firebase:", error);
                alert("PESAN ERROR FIREBASE (Simpan Data):\n\n" + error.message);
            } finally {
                toggleLoading(false);
            }
        }
        function initApp() { fetchFromCloud(); }
        function saveData() { saveToCloud(); }

        // ==========================================
        // FIX 3: updateDropdowns — rebuild select materi dengan benar
        // Bug lama: innerHTML di-set, tapi onchange="updateMateriInfo()" sudah ada
        // di atribut HTML jadi tidak hilang. Masalah sebenarnya adalah saat
        // addMateri() lama dipanggil, quota 0 dipakai untuk materi baru padahal
        // user ingin kuota tak terbatas jika field dikosongkan.
        // Sekarang: quota 0 = tidak terbatas (unlimited), quota > 0 = ada batas.
        // ==========================================
        function updateDropdowns() {
            // Dropdown ruang di pengaturan prodi
            const roomSelect = document.getElementById('newProdiRoom');
            if (roomSelect) {
                roomSelect.innerHTML = dataRoom.map(r => `<option value="${r}">${r}</option>`).join('');
            }

            // FIX: Rebuild dropdown materi di modal edit
            const editMateri = document.getElementById('editMateri');
            if (editMateri) {
                const currentVal = editMateri.value; // Simpan nilai yang sedang dipilih
                editMateri.innerHTML = '<option value="">- Kosong -</option>' +
                    dataMateri.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
                // Kembalikan nilai sebelumnya jika masih ada
                if (currentVal) editMateri.value = currentVal;
            }

            // Rebuild dropdown ruang di modal edit
            const editRuang = document.getElementById('editRuang');
            if (editRuang) {
                const currentRuang = editRuang.value;
                editRuang.innerHTML = '<option value="">- Default Ruang Prodi -</option>' +
                    '<option value="-">- Tanpa Ruangan -</option>' +
                    dataRoom.map(r => `<option value="${r}">${r}</option>`).join('');
                if (currentRuang) editRuang.value = currentRuang;
            }
        }

        // ==========================================
        // MATERI — KUOTA
        // ==========================================
        function countMateriUsage(prodiId, materiName) {
            let count = 0;
            const prodiData = scheduleData[prodiId];
            if (!prodiData) return 0;
            for (const bulan in prodiData) {
                for (const minggu in prodiData[bulan]) {
                    for (const sesi in prodiData[bulan][minggu]) {
                        for (const hari in prodiData[bulan][minggu][sesi]) {
                            const cell = prodiData[bulan][minggu][sesi][hari];
                            if (cell && cell.materi === materiName) count++;
                        }
                    }
                }
            }
            return count;
        }
        function updateMateriInfo() {
            const infoEl = document.getElementById('materiQuotaInfo');
            const materiName = document.getElementById('editMateri').value;
            if (!materiName) { infoEl.classList.add('hidden'); return; }
            const materiObj = dataMateri.find(m => m.name === materiName);
            if (!materiObj) { infoEl.classList.add('hidden'); return; }
            let currentCellMateri = "";
            if (currentEditCell) {
                const { bulan, minggu, sesi, hari } = currentEditCell;
                const existingCell = scheduleData[currentProdi.id]?.[bulan]?.[minggu]?.[sesi]?.[hari];
                if (existingCell) currentCellMateri = existingCell.materi;
            }
            let isAlreadyInThisCell = (currentCellMateri === materiName);
            let usage = countMateriUsage(currentProdi.id, materiName);
            let text = `Total jadwal di ${currentProdi.name}: ${usage}x.`;
            if (materiObj.quota > 0) {
                let sisa = materiObj.quota - usage;
                if (!isAlreadyInThisCell) {
                    sisa = sisa - 1;
                    text = `Terpakai: ${usage}x. (Sisa Kuota: ${sisa}x setelah disimpan)`;
                } else {
                    text = `Terpakai: ${usage}x. (Sisa Kuota: ${sisa}x)`;
                }
                if (sisa < 0) { infoEl.className = "text-xs font-bold mt-1 text-red-600"; text += " ⚠️ OVERLIMIT!"; }
                else if (sisa === 0) { infoEl.className = "text-xs font-bold mt-1 text-orange-600"; text += " ⚠️ Kuota Habis"; }
                else { infoEl.className = "text-xs font-semibold mt-1 text-blue-600"; }
            } else {
                // quota = 0 → tidak terbatas
                infoEl.className = "text-xs font-semibold mt-1 text-gray-500";
                text = `Terpakai: ${usage}x. (Kuota: Tidak terbatas)`;
            }
            infoEl.innerText = text;
            infoEl.classList.remove('hidden');
        }

        // ==========================================
        // DASHBOARD
        // ==========================================
        function renderDashboard() {
            const container = document.getElementById('prodiContainer');
            container.innerHTML = '';
            dataProdi.forEach(prodi => {
                const btn = document.createElement('button');
                btn.className = "bg-white p-6 rounded-xl shadow border-l-4 border-blue-500 hover:shadow-lg hover:-translate-y-1 transition text-left flex flex-col justify-between";
                btn.onclick = () => openSchedule(prodi);
                btn.innerHTML = `
                    <div class="text-2xl font-bold text-gray-800 mb-2">${prodi.name}</div>
                    <div class="text-sm text-gray-500 flex items-center gap-2">
                        <i class="fas fa-map-marker-alt text-red-500"></i> ${prodi.defaultRoom}
                    </div>`;
                container.appendChild(btn);
            });
        }

        // ==========================================
        // SETTINGS
        // ==========================================
        function openSettings() {
            document.getElementById('settingsModal').classList.remove('hidden');
            renderSettingsLists();
        }
        function closeSettings() {
            document.getElementById('settingsModal').classList.add('hidden');
        }
        function renderSettingsLists() {
            document.getElementById('listSettingProdi').innerHTML = dataProdi.map((p, index) =>
                `<li class="flex justify-between items-center bg-white p-2 rounded border">
                    <span><b>${p.name}</b> (${p.defaultRoom})</span>
                    <button onclick="deleteProdi(${index})" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                </li>`).join('');
            document.getElementById('listSettingRoom').innerHTML = dataRoom.map((r, index) =>
                `<li class="flex justify-between items-center bg-white p-2 rounded border">
                    <span>${r}</span>
                    <button onclick="deleteRoom(${index})" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                </li>`).join('');
            document.getElementById('listSettingMateri').innerHTML = dataMateri.map((m, index) => {
                const quotaLabel = m.quota > 0
                    ? `<span class="text-[10px] bg-blue-100 text-blue-800 px-2 py-1 rounded ml-2 font-bold">Kuota: ${m.quota}x</span>`
                    : `<span class="text-[10px] bg-gray-100 text-gray-500 px-2 py-1 rounded ml-2">Tak Terbatas</span>`;
                return `<li class="flex justify-between items-center bg-white p-2 rounded border">
                    <div><span class="font-semibold">${m.name}</span>${quotaLabel}</div>
                    <button onclick="deleteMateri(${index})" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                </li>`;
            }).join('');
        }
        function addProdi() {
            const name = document.getElementById('newProdiName').value.trim();
            const room = document.getElementById('newProdiRoom').value;
            if (!name) return;
            dataProdi.push({ id: name.toLowerCase().replace(/\s/g, ''), name, defaultRoom: room });
            document.getElementById('newProdiName').value = '';
            saveData(); renderDashboard(); renderSettingsLists();
        }
        function deleteProdi(index) {
            if (confirm('Hapus prodi ini?')) {
                dataProdi.splice(index, 1);
                saveData(); renderDashboard(); renderSettingsLists();
            }
        }
        function addRoom() {
            const val = document.getElementById('newRoomName').value.trim();
            if (!val) return;
            dataRoom.push(val);
            document.getElementById('newRoomName').value = '';
            saveData(); updateDropdowns(); renderSettingsLists();
        }
        function deleteRoom(index) {
            if (confirm('Hapus ruang ini?')) {
                dataRoom.splice(index, 1);
                saveData(); updateDropdowns(); renderSettingsLists();
            }
        }

        // ==========================================
        // FIX 4: addMateri — tambah materi baru kemudian PANGGIL updateDropdowns
        // agar dropdown di modal edit langsung ter-update tanpa harus buka-tutup modal.
        // Kuota 0 = tidak terbatas (sesuai placeholder "Kosongkan jika tak terbatas").
        // ==========================================
        function addMateri() {
            const val = document.getElementById('newMateriName').value.trim();
            if (!val) {
                alert('Nama materi tidak boleh kosong!');
                return;
            }
            // Cek duplikat nama
            if (dataMateri.some(m => m.name.toLowerCase() === val.toLowerCase())) {
                alert('Materi dengan nama tersebut sudah ada!');
                return;
            }
            const quotaVal = parseInt(document.getElementById('newMateriQuota').value) || 0;
            dataMateri.push({ name: val, quota: quotaVal });
            document.getElementById('newMateriName').value = '';
            document.getElementById('newMateriQuota').value = '';
            // Simpan & refresh semua dropdown + list
            saveData();
            updateDropdowns();
            renderSettingsLists();
        }
        function deleteMateri(index) {
            if (confirm('Hapus materi ini?')) {
                dataMateri.splice(index, 1);
                saveData(); updateDropdowns(); renderSettingsLists();
            }
        }

        // ==========================================
        // JADWAL — RENDER TABLE
        // ==========================================
        function openSchedule(prodi) {
            currentProdi = prodi;
            document.getElementById('scheduleModal').classList.remove('hidden');
            renderScheduleTable();
        }
        function closeSchedule() {
            document.getElementById('scheduleModal').classList.add('hidden');
            currentProdi = null;
        }

        /**
         * FIX 5: buildTableContent — gunakan getMondayForWeek() untuk tanggal yang benar
         * Bug lama: weekBaseDate diset dari baseDate bulan + (romawi_global_index * 7)
         *   → untuk minggu XV di Oktober, index = 14, jadi loncat 14*7=98 hari dari
         *     base Oktober → tanggal jadi salah.
         * Sekarang: setiap minggu punya tanggal Senin hardcoded di bulanConfig.
         */
        function buildTableContent(prodi, bulan, wrapperElement) {
            const activeDefaultRoom = getActiveRoom(prodi.defaultRoom, bulan);
            if (!scheduleData[prodi.id]) scheduleData[prodi.id] = {};
            if (!scheduleData[prodi.id][bulan]) scheduleData[prodi.id][bulan] = {};

            let existingWeeks = Object.keys(scheduleData[prodi.id][bulan]);
            existingWeeks.sort((a, b) => listMingguRomawi.indexOf(a) - listMingguRomawi.indexOf(b));

            if (existingWeeks.length === 0) {
                let defaultEmptyWeeks = getDefaultWeeksForMonth(bulan);
                defaultEmptyWeeks.forEach(w => { scheduleData[prodi.id][bulan][w] = {}; });
                existingWeeks = [...defaultEmptyWeeks];
            }

            existingWeeks.forEach((minggu) => {
                const weekDiv = document.createElement('div');
                weekDiv.className = 'week-container';

                const tableNode = document.createElement('table');
                tableNode.className = 'jadwal-table w-full text-sm';
                const tbody = document.createElement('tbody');
                tableNode.appendChild(tbody);

                if (!scheduleData[prodi.id][bulan][minggu]) {
                    scheduleData[prodi.id][bulan][minggu] = {};
                }

                let skipDay = { 'Senin': 0, 'Selasa': 0, 'Rabu': 0, 'Kamis': 0, 'Jumat': 0 };

                // Header baris
                const headerTr = document.createElement('tr');
                headerTr.innerHTML = `<th>Minggu Ke-</th><th>Jam Ke-</th><th>Pukul</th>`;

                // *** PERBAIKAN UTAMA TANGGAL ***
                // Gunakan tanggal Senin yang sudah benar dari lookup table
                const weekMonday = getMondayForWeek(bulan, minggu);

                const formattedDates = [];
                daftarHari.forEach((hari, hIndex) => {
                    const dayDate = new Date(weekMonday);
                    dayDate.setDate(dayDate.getDate() + hIndex);
                    const dd = String(dayDate.getDate()).padStart(2, '0');
                    const mm = String(dayDate.getMonth() + 1).padStart(2, '0');
                    const yyyy = dayDate.getFullYear();
                    const dateString = `${dd}/${mm}/${yyyy}`;
                    formattedDates.push(dateString);
                    headerTr.innerHTML += `<th>${hari}<br><span class="text-xs font-normal">(${dateString})</span></th>`;
                });
                tbody.appendChild(headerTr);

                strukturWaktu.forEach((waktu, sIndex) => {
                    if (!scheduleData[prodi.id][bulan][minggu][waktu.sesi]) {
                        scheduleData[prodi.id][bulan][minggu][waktu.sesi] = {};
                    }
                    const tr = document.createElement('tr');
                    if (sIndex === 0) {
                        const tdMinggu = document.createElement('td');
                        tdMinggu.rowSpan = strukturWaktu.length;
                        tdMinggu.className = "bg-white font-bold border";
                        tdMinggu.innerText = minggu;
                        tr.appendChild(tdMinggu);
                    }
                    tr.innerHTML += `<td class="font-bold border">${waktu.sesi}</td><td class="font-bold border">${waktu.jam}</td>`;
                    daftarHari.forEach((hari, hIndex) => {
                        if (skipDay[hari] > 0) { skipDay[hari]--; return; }
                        const td = document.createElement('td');
                        const cellData = scheduleData[prodi.id][bulan][minggu][waktu.sesi][hari] || {
                            materi: '', instruktur: '', ruang: ''
                        };
                        const targetDateString = formattedDates[hIndex];
                        const autoPengukuhan = cellData.materi === 'PENGUKUHAN SISWA BARU & OPENING CLASS BATCH XVII';
                        const isFull = cellData.isFullDay || autoPengukuhan;
                        td.className = 'hari-cell border ' + (cellData.isLibur ? 'bg-red-400 text-white' : '');
                        if (isFull) {
                            const spanCount = strukturWaktu.length - sIndex;
                            td.rowSpan = spanCount;
                            skipDay[hari] = spanCount - 1;
                        }
                        let htmlContent = '<div class="cell-content ' + (isFull ? 'justify-center items-center' : '') + '">';
                        if (cellData.materi) {
                            const textClass = (isFull && autoPengukuhan) ? 'writing-vertical' : '';
                            htmlContent += `<div class="cell-materi ${textClass}">${cellData.materi}</div>`;
                            if (cellData.instruktur) {
                                htmlContent += `<div class="cell-instruktur">${cellData.instruktur}</div>`;
                            }
                            let displayRuang = cellData.ruang;
                            if (!displayRuang || displayRuang === '') { displayRuang = activeDefaultRoom; }
                            else if (displayRuang === '-') { displayRuang = ''; }
                            if (displayRuang) {
                                const ruangColor = cellData.isLibur ? 'bg-red-600' : 'bg-blue-500';
                                htmlContent += `<div class="cell-ruang ${ruangColor}">${displayRuang}</div>`;
                            }
                        }
                        htmlContent += '</div>';
                        td.innerHTML = htmlContent;
                        td.onclick = () => openEditModal(bulan, minggu, waktu.sesi, hari, cellData, targetDateString);
                        tr.appendChild(td);
                    });
                    tbody.appendChild(tr);
                });
                weekDiv.appendChild(tableNode);
                wrapperElement.appendChild(weekDiv);
            });
        }

        function renderScheduleTable() {
            const wrapper = document.getElementById('tableWrapper');
            wrapper.innerHTML = '';
            if (!currentProdi) return;
            const bulan = document.getElementById('monthSelector').value;
            const activeDefaultRoom = getActiveRoom(currentProdi.defaultRoom, bulan);
            document.getElementById('scheduleTitle').innerText =
                `JADWAL MATERI - ${currentProdi.name} (${activeDefaultRoom}) - ${bulan}`;
            buildTableContent(currentProdi, bulan, wrapper);
        }

        // ==========================================
        // CETAK PDF
        // ==========================================
        function openPrintModal() {
            const listDiv = document.getElementById('printMonthList');
            const currentSelectedMonth = document.getElementById('monthSelector').value;
            listDiv.innerHTML = daftarBulan.map(bulan => {
                const isChecked = (bulan === currentSelectedMonth) ? 'checked' : '';
                return `<label class="flex items-center space-x-3 cursor-pointer p-3 hover:bg-gray-50 rounded border border-gray-200">
                    <input type="checkbox" value="${bulan}" class="print-month-cb form-checkbox h-5 w-5 text-blue-600" ${isChecked}>
                    <span class="text-sm font-bold text-gray-800">Bulan ${bulan}</span>
                </label>`;
            }).join('');
            document.getElementById('printModal').classList.remove('hidden');
        }
        function closePrintModal() { document.getElementById('printModal').classList.add('hidden'); }
        let allSelected = false;
        function toggleAllPrintMonths() {
            allSelected = !allSelected;
            document.querySelectorAll('.print-month-cb').forEach(cb => cb.checked = allSelected);
        }
        function executePrint() {
            const checkedMonths = Array.from(document.querySelectorAll('.print-month-cb:checked')).map(cb => cb.value);
            if (checkedMonths.length === 0) { alert('Pilih minimal 1 bulan untuk dicetak!'); return; }
            closePrintModal();
            const wrapper = document.getElementById('tableWrapper');
            wrapper.innerHTML = '';
            checkedMonths.forEach((bulan) => {
                const activeDefaultRoom = getActiveRoom(currentProdi.defaultRoom, bulan);
                const titleHTML = `<h2 class="print-only-title">JADWAL MATERI - ${currentProdi.name} (${activeDefaultRoom}) - ${bulan}</h2>`;
                const sectionDiv = document.createElement('div');
                sectionDiv.className = 'print-section';
                sectionDiv.innerHTML = titleHTML;
                buildTableContent(currentProdi, bulan, sectionDiv);
                wrapper.appendChild(sectionDiv);
            });
            document.getElementById('scheduleTitle').classList.add('no-print');
            setTimeout(() => {
                window.print();
                setTimeout(() => {
                    document.getElementById('scheduleTitle').classList.remove('no-print');
                    renderScheduleTable();
                }, 500);
            }, 300);
        }

        // ==========================================
        // TAMBAH / KURANGI MINGGU
        // ==========================================
        function addWeek() {
            const bulan = document.getElementById('monthSelector').value;
            if (!scheduleData[currentProdi.id]) scheduleData[currentProdi.id] = {};
            if (!scheduleData[currentProdi.id][bulan]) scheduleData[currentProdi.id][bulan] = {};
            let existingWeeks = Object.keys(scheduleData[currentProdi.id][bulan]);
            if (existingWeeks.length >= listMingguRomawi.length) {
                alert('Maksimal jumlah minggu tercapai.');
                return;
            }
            let maxIndex = -1;
            existingWeeks.forEach(w => {
                let idx = listMingguRomawi.indexOf(w);
                if (idx > maxIndex) maxIndex = idx;
            });
            const nextWeek = listMingguRomawi[maxIndex + 1];
            if (!nextWeek) { alert('Tidak ada minggu romawi berikutnya.'); return; }
            scheduleData[currentProdi.id][bulan][nextWeek] = {};
            saveData(); renderScheduleTable();
        }
        function removeWeek() {
            const bulan = document.getElementById('monthSelector').value;
            let existingWeeks = Object.keys(scheduleData[currentProdi.id][bulan] || {});
            if (existingWeeks.length <= 1) { alert('Minimal harus tersisa 1 minggu.'); return; }
            existingWeeks.sort((a, b) => listMingguRomawi.indexOf(a) - listMingguRomawi.indexOf(b));
            const lastWeek = existingWeeks[existingWeeks.length - 1];
            if (confirm(`Yakin ingin menghapus tabel Minggu Ke-${lastWeek}? Data di dalamnya akan hilang.`)) {
                delete scheduleData[currentProdi.id][bulan][lastWeek];
                saveData(); renderScheduleTable();
            }
        }

        // ==========================================
        // EDIT MODAL
        // ==========================================
        function openEditModal(bulan, minggu, sesi, hari, cellData, targetDateString) {
            currentEditCell = { bulan, minggu, sesi, hari };
            document.getElementById('editTitle').innerText =
                `Isi Jadwal: ${hari} (${targetDateString}), Minggu ${minggu} (Sesi ${sesi})`;

            // Pastikan dropdown materi terbaru sebelum set value
            updateDropdowns();
            document.getElementById('editMateri').value = cellData.materi || '';
            document.getElementById('editInstruktur').value = cellData.instruktur || '';
            document.getElementById('editRuang').value = cellData.ruang || '';
            document.getElementById('editFullDay').checked = cellData.isFullDay || false;
            document.getElementById('editLibur').checked = cellData.isLibur || false;
            updateMateriInfo();
            document.getElementById('editModal').classList.remove('hidden');
        }
        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
            currentEditCell = null;
        }
        function saveCellData() {
            if (!currentEditCell) return;
            const { bulan, minggu, sesi, hari } = currentEditCell;
            const materiName = document.getElementById('editMateri').value;
            const instrukturName = document.getElementById('editInstruktur').value;
            const ruangName = document.getElementById('editRuang').value;
            const isFullDay = document.getElementById('editFullDay').checked;
            const isLibur = document.getElementById('editLibur').checked;

            // Cek bentrok lintas prodi
            if (materiName !== "") {
                let bentrokProdi = null;
                for (const prodiObj of dataProdi) {
                    if (prodiObj.id === currentProdi.id) continue;
                    const selProdiLain = scheduleData[prodiObj.id]?.[bulan]?.[minggu]?.[sesi]?.[hari];
                    if (selProdiLain && selProdiLain.materi === materiName) {
                        bentrokProdi = prodiObj.name;
                        break;
                    }
                }
                if (bentrokProdi) {
                    alert(`Gagal menyimpan! Materi "${materiName}" sudah dijadwalkan di kelas ${bentrokProdi} pada waktu yang sama.`);
                    return;
                }
            }

            if (!scheduleData[currentProdi.id]) scheduleData[currentProdi.id] = {};
            if (!scheduleData[currentProdi.id][bulan]) scheduleData[currentProdi.id][bulan] = {};
            if (!scheduleData[currentProdi.id][bulan][minggu]) scheduleData[currentProdi.id][bulan][minggu] = {};
            if (!scheduleData[currentProdi.id][bulan][minggu][sesi]) scheduleData[currentProdi.id][bulan][minggu][sesi] = {};

            scheduleData[currentProdi.id][bulan][minggu][sesi][hari] = {
                materi: materiName,
                instruktur: instrukturName,
                ruang: ruangName,
                isFullDay: isFullDay,
                isLibur: isLibur
            };
            saveData(); closeEditModal(); renderScheduleTable();
        }

        // Jalankan inisialisasi
        window.onload = initApp;
    </script>
</body>
</html>
